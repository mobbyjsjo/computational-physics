name: Build Markdown PDF

on:
  workflow_dispatch:
  push:
    paths:
      - "notes/ode.md"
      - ".github/workflows/markdown-pdf.yml"

permissions:
  contents: write

jobs:
  build-pdf:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc texlive-xetex texlive-fonts-recommended texlive-latex-extra

      - name: Build PDF
        run: |
          pandoc notes/ode.md -o notes/ode.pdf --pdf-engine=xelatex

      - name: Commit PDF
        run: |
          if git diff --quiet -- notes/ode.pdf; then
            echo "No PDF changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add notes/ode.pdf
          git commit -m "Update notes/ode.pdf [skip ci]"
          git push
