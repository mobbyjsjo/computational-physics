<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>计算物理参考资料全书</title>
  <style>
    body { font-family: "Noto Sans CJK SC", "PingFang SC", "Microsoft YaHei", sans-serif; line-height: 1.6; max-width: 900px; margin: 40px auto; padding: 0 20px; }
    h1, h2, h3, h4 { margin-top: 1.2em; }
    code, pre { background: #f6f8fa; padding: 2px 4px; border-radius: 4px; }
    pre { padding: 12px; overflow-x: auto; }
    table { border-collapse: collapse; width: 100%; margin: 12px 0; }
    th, td { border: 1px solid #ddd; padding: 8px; }
    th { background: #f2f2f2; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    window.MathJax = { tex: { inlineMath: [['$', '$'], ['\\(', '\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] } };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>
<body>
  <div id="content">正在加载文档…</div>
  <script>
    const mdUrl = "https://raw.githubusercontent.com/mobbyjsjo/-/main/%E8%AE%A1%E7%AE%97%E7%89%A9%E7%90%86%E5%8F%82%E8%80%83%E8%B5%84%E6%96%99%E5%85%A8%E4%B9%A6.md";
    fetch(mdUrl)
      .then(res => res.text())
      .then(md => {
        document.getElementById('content').innerHTML = marked.parse(md);
        if (window.MathJax) { MathJax.typesetPromise(); }
      })
      .catch(() => {
        document.getElementById('content').innerText = '加载失败，请检查网络或稍后重试。';
      });
  </script>
</body>
</html>
