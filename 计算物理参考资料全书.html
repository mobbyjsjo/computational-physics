> 目标：面向“刚开始学习、临时备考”的同学。**每个概念讲清楚“是什么、为什么、怎么用、考试怎么考”。** 文字量比之前大幅增加，尽量接近 20~30 页的讲义长度。

---

## 第一章 常微分方程（ODE）

### 1.1 ODE 是什么（从物理图像讲起）
**ODE**：只有一个自变量（通常是时间 $t$）的微分方程。它描述“系统状态随时间的变化”。

**物理直观**：
- 质点运动：$m\,\dfrac{d^2x}{dt^2} = F(x,t)$
- RC 电路：$RC\,\dfrac{dV}{dt}+V=U(t)$
- 放射性衰变：$\dfrac{dN}{dt}=-\lambda N$

**初值问题（IVP）**：给定起点 $t_0$ 的状态 $y(t_0)=y_0$，求 $t>t_0$ 的解。

**边值问题（BVP）**：给定区间两端的值，如 $y(a)$ 与 $y(b)$，求整段解。

> 考试常问：IVP 与 BVP 的区别？答：IVP 给“起点”，BVP 给“区间两端”。

---

### 1.2 为什么要降阶（核心技能）
**所有数值算法（欧拉法、RK 法）都要求“只含一阶导数”。**
所以二阶、三阶方程必须变为一阶方程组。

**例子：**
$$\frac{d^2x}{dt^2}=f(x,t)$$
令 $v=\dfrac{dx}{dt}$，则
$$
\begin{cases}
\dfrac{dx}{dt}=v \\
\dfrac{dv}{dt}=f(x,t)
\end{cases}
$$

**物理理解**：把“位置–加速度”变成“位置–速度”的一阶系统。

> 考试题：给二阶方程，写成一阶方程组（送分）。

---

### 1.3 欧拉法（最基础）
**思想**：把曲线用切线近似。下一步只看“当前斜率”。

**公式**：
$$y_{n+1}=y_n+h\,f(t_n,y_n)$$

**局部截断误差**：$O(h^2)$，**全局误差**：$O(h)$（一阶方法）。

**手算例题（一步）**：
$y'=t+y,\ y(0)=1,\ h=0.1$。
- $f(0,1)=1$
- $y_1=1+0.1\times1=1.1$

**手算例题（两步）**：
- $t_1=0.1, y_1=1.1$
- $f(0.1,1.1)=1.2$
- $y_2=1.1+0.1\times1.2=1.22$

> 典型考试题：手算 1~2 步欧拉法；常见微分方程为 $y'=t+y$ 或 $y'=-ty$。

---

### 1.4 误差分析（必须讲透）
**为什么步长不���越小越好？**

误差来源：
1) **截断误差**：忽略高阶项（数学误差）。
2) **舍入误差**：计算机精度有限（硬件误差）。

**总误差近似**：
$$E(h)\approx c_1 h^p + c_2\frac{\epsilon}{h}$$

- 当 $h$ 变大：截断误差变大。
- 当 $h$ 变小：舍入误差因步数多而增大。

**结论**：总误差呈“U 型曲线”，存在最优步长 $h_{opt}$。

> 考试问答：步长是不是越小越好？标准答案：不是，截断误差随 $h$ 减小下降，但舍入误差随 $1/h$ 上升，存在最佳步长。

---

### 1.5 显式 vs 隐式（刚性问题必考）
**显式法**：下一步只用已知量，计算快但稳定性差。

**隐式法**：下一步出现在等式两侧，需要解方程，但稳定性好。

**刚性问题（Stiff）**：存在快慢两个时间尺度。显式法需要极小步长才能稳定，隐式法更稳。

> 送分题：刚性问题必须用隐式方法（后向欧拉）。

---

### 1.6 Runge–Kutta（RK2 / RK4）
**RK2（改进欧拉）**：
$$
\begin{aligned}
 k_1 &= f(t_n,y_n) \\
 k_2 &= f(t_n+h, y_n+h k_1) \\
 y_{n+1} &= y_n + \frac{h}{2}(k_1+k_2)
\end{aligned}
$$

**RK4（最常用）**：
$$
\begin{aligned}
 k_1 &= f(t_n,y_n) \\
 k_2 &= f(t_n+h/2, y_n+h k_1/2) \\
 k_3 &= f(t_n+h/2, y_n+h k_2/2) \\
 k_4 &= f(t_n+h, y_n+h k_3) \\
 y_{n+1} &= y_n + \frac{h}{6}(k_1+2k_2+2k_3+k_4)
\end{aligned}
$$

**误差**：RK4 全局 $O(h^4)$，局部 $O(h^5)$。

> 考试：RK4 公式常要求默写或填空。

---

### 1.7 多步法与预测-校正（补充）
多步法使用历史点提高效率，预测-校正将显式与隐式结合。

**答题模板**：
> “多步法精度高但需历史点，预测-校正先显式预测再隐式校正以提高稳定性。”

---

## 第二章 偏微分方程（PDE）

### 2.1 类型判别（判别式）
标准形式：
$$A u_{xx}+B u_{xy}+C u_{yy}+\cdots=0$$
判别式：$\Delta=B^2-4AC$。

- $\Delta>0$：双曲型（波动）
- $\Delta=0$：抛物型（热传导/扩散）
- $\Delta<0$：椭圆型（拉普拉斯/泊松）

**例题**：$3u_{xx}+4u_{xy}+5u_{yy}=0$，$\Delta=16-60<0$，椭圆型。

---

### 2.2 初边值条件（必须会区分）
- 初始条件：$u(x,0)=g(x)$
- Dirichlet：$u=\phi$
- Neumann：$\partial u/\partial n=\psi$
- Robin：$au+b\partial u/\partial n=\phi$

---

### 2.3 差分公式（核心计算）
一阶中心差分：
$$\frac{\partial u}{\partial x}\approx\frac{u_{i+1}-u_{i-1}}{2\Delta x}$$

二阶中心差分：
$$\frac{\partial^2 u}{\partial x^2}\approx\frac{u_{i+1}-2u_i+u_{i-1}}{\Delta x^2}$$

**记忆**：左右相加减两倍自己，再除以步长平方。

---

### 2.4 热传导方程 + FTCS（显式）
$$\frac{\partial u}{\partial t}=\alpha\frac{\partial^2 u}{\partial x^2}$$

差分：
$$u_i^{n+1}=u_i^n+r(u_{i+1}^n-2u_i^n+u_{i-1}^n)$$
其中 $r=\alpha\Delta t/\Delta x^2$。

稳定性：$r\le1/2$。

---

### 2.5 波动方程 + CFL
$$\frac{\partial^2 u}{\partial t^2}=c^2\frac{\partial^2 u}{\partial x^2}$$
CFL 条件：
$$C=\frac{c\Delta t}{\Delta x}\le1$$

---

### 2.6 拉普拉斯/泊松 + 五点差分
$$\frac{\partial^2 u}{\partial x^2}+\frac{\partial^2 u}{\partial y^2}=0$$
五点差分：
$$u_{i,j}=\frac{1}{4}(u_{i+1,j}+u_{i-1,j}+u_{i,j+1}+u_{i,j-1})$$

---

### 2.7 迭代法（Jacobi / Gauss-Seidel / SOR）
椭圆型方程通常转换为线性方程组，用迭代法解。

---

## 第三章 蒙特卡罗方法（MC）

### 3.1 线性同余法（LCG）——最细讲法
公式：
$$X_{n+1}=(aX_n+c)\bmod m$$

“取余数”就是只要除法的余数。
- $22\bmod8=6$（因为 $22=8\times2+6$）
- $5\bmod7=5$（被除数更小，余数就是自己）

**例题**：$a=5,c=7,m=8,X_0=3$。
- $X_1=(5\cdot3+7)\bmod8=6$
- $X_2=(5\cdot6+7)\bmod8=5$
- $X_3=(5\cdot5+7)\bmod8=0$

**转成 [0,1]**：$R_n=X_n/m$。

---

### 3.2 逆变换采样（手把手）
目标：均匀随机数 $r\in[0,1]$ 变成目标分布变量 $x$。

步骤：
1) 计算 $C(x)=\int p(x)dx$；
2) 令 $C(x)=r$；
3) 解出 $x$。

**例题**：$p(x)=2e^{-2x}$。
- $C(x)=1-e^{-2x}$
- $1-e^{-2x}=r$
- $x=-\frac{1}{2}\ln(1-r)$

---

### 3.3 MC 积分（均值法）
$$I\approx (b-a)\frac{1}{N}\sum_{i=1}^N f(x_i)$$
误差：$O(1/\sqrt{N})$。

**例题**：$\int_0^2 x^2 dx$，$x_1=0.5,x_2=1.0,x_3=1.5$。
- $f=0.25,1,2.25$，均值 $=1.17$，$I\approx2.33$。

---

### 3.4 Metropolis（MCMC）
- $\Delta E<0$：必接受
- $\Delta E>0$：以 $e^{-\Delta E/kT}$ 概率接受

**例题**：$\Delta E=2, T=2$，$P=e^{-1}=0.368$，$r=0.4$ → 拒绝。

---

## 第四章 机器学习基础

### 4.1 监督 vs 无监督（具体例子）
- 监督：有标签，如“给星系图片+标签，训练分类器”。
- 无监督：无标签，如“自动聚类恒星光谱”。

---

### 4.2 过拟合与欠拟合（直观理解）
- 欠拟合：模型太简单，训练集就失败。
- 过拟合：模型太复杂，训练集很好但测试集差。

缓解：正则化、Dropout、更多数据、早停。

---

### 4.3 梯度下降（手算模板）
$$w_{new}=w_{old}-\eta\frac{\partial L}{\partial w}$$

例题：$y=wx, x=2, y_{true}=5, w=2, \eta=0.1$。
- $y_{pred}=4$
- $\partial L/\partial w=(4-5)\cdot2=-2$
- $w_{new}=2.2$

---

### 4.4 SVM / 决策树 / K-means
- **SVM**：最大间隔超平面，支持向量决定边界。
- **决策树**：基尼系数 $Gini=1-\sum p_i^2$。
- **K-means**：分配→更新质心。

---

## 第五章 并行与工程实现

### 5.1 阿姆达尔定律
$$Speedup=\frac{1}{(1-P)+P/N}$$

例题：$P=0.8, N=4$，$Speedup=2.5$。

---

### 5.2 OpenMP vs MPI
- OpenMP：共享内存，多线程，易并行，易竞争。
- MPI：分布式内存，多进程，通信成本高。

---

### 5.3 数据竞争（Data Race）
多线程同时写同一变量会出错。

解决：加锁、原子操作、规约（reduction）。

---

### 5.4 GPU 与 SIMD
- GPU：大量简单核心，适合矩阵/图像并行。
- SIMD：单指令多数据，向量化加速。
